<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Geschiedenis VWO Flashcards 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #2c3e50;
    color: white;
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .stat {
    background: rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 5px 4px;
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .stat-lbl { font-size: 9px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.3px; }
  .stat.good .stat-val { color: #4cd964; }
  .stat.wrong .stat-val { color: #ff6b6b; }
  .stat.ratio .stat-val { color: #ffd60a; }

  .progress-bar-wrap {
    margin-top: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #4cd964;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  main {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .tijdvak-badge {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: #e8e6df;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .card.flip { background: #f0faf5; }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card.flip .card-label { color: #2a9d5c; }

  .ka-tag {
    font-size: 10px;
    color: #aaa;
    background: #f0ede6;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
    margin-bottom: 2px;
  }

  .card-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.5;
    flex: 1;
  }
  .card-hint {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: auto;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-row.single { grid-template-columns: 1fr; }

  button {
    border: none;
    border-radius: 12px;
    padding: 14px 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.97); opacity: 0.85; }
  .btn-flip { background: #2c3e50; color: white; }
  .btn-good { background: #4cd964; color: #1a4a25; }
  .btn-wrong { background: #ff6b6b; color: #5a0000; }
  .btn-reset { background: #e8e6df; color: #555; font-size: 12px; padding: 5px 10px; border-radius: 8px; }

  .rolling-bar {
    background: white;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rolling-dots {
    display: flex;
    gap: 3px;
    flex: 1;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e0ddd5;
    flex-shrink: 0;
  }
  .dot.g { background: #4cd964; }
  .dot.w { background: #ff6b6b; }

  .finished {
    text-align: center;
    padding: 24px 16px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .finished h2 { font-size: 22px; margin-bottom: 8px; }
  .finished p { color: #666; margin-bottom: 16px; font-size: 15px; }
  .btn-restart { background: #2c3e50; color: white; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
  .hidden { display: none !important; }
  #question-counter { font-size: 12px; color: #999; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <h1>📚 Geschiedenis VWO — Syllabus CE 2026</h1>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="s-total">0</div>
      <div class="stat-lbl">Aangeboden</div>
    </div>
    <div class="stat good">
      <div class="stat-val" id="s-good">0</div>
      <div class="stat-lbl">Goed</div>
    </div>
    <div class="stat wrong">
      <div class="stat-val" id="s-wrong">0</div>
      <div class="stat-lbl">Fout</div>
    </div>
    <div class="stat ratio">
      <div class="stat-val" id="s-ratio">—</div>
      <div class="stat-lbl">Laatste 20</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</header>

<main>
  <div id="game-area">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
      <span class="tijdvak-badge" id="tijdvak-badge">Tijdvak 1</span>
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="question-counter"></span>
        <button class="btn-reset" onclick="confirmReset()">↺ Reset</button>
      </div>
    </div>

    <div class="card" id="card" onclick="flipCard()">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div class="card-label" id="card-label">Vraag</div>
        <span class="ka-tag" id="ka-tag"></span>
      </div>
      <div class="card-text" id="card-text">Laden…</div>
      <div class="card-hint" id="card-hint">Tik om antwoord te zien</div>
    </div>

    <div class="btn-row single" id="btn-flip-row">
      <button class="btn-flip" onclick="flipCard()">Toon antwoord</button>
    </div>

    <div class="btn-row hidden" id="btn-answer-row">
      <button class="btn-wrong" onclick="answer(false)">✗ Fout</button>
      <button class="btn-good" onclick="answer(true)">✓ Goed</button>
    </div>

    <div class="rolling-bar">
      <span style="font-size:11px; white-space:nowrap; color:#999;">Laatste 20:</span>
      <div class="rolling-dots" id="rolling-dots"></div>
      <span style="font-size:12px; font-weight:600;" id="rolling-pct">—</span>
    </div>
  </div>

  <div id="finished-area" class="finished hidden">
    <div style="font-size:48px; margin-bottom:12px;">🎉</div>
    <h2>Klaar!</h2>
    <p>Je hebt alle vragen beantwoord.</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
      <div style="background:#f0faf5; border-radius:10px; padding:12px; text-align:center;">
        <div style="font-size:24px; font-weight:700; color:#2a9d5c;" id="f-good">—</div>
        <div style="font-size:11px; color:#666;">In één keer goed</div>
      </div>
      <div style="background:#fff5f5; border-radius:10px; padding:12px; text-align:center;">
        <div style="font-size:24px; font-weight:700; color:#c0392b;" id="f-wrong">—</div>
        <div style="font-size:11px; color:#666;">Fout (of overgeslagen)</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">Opnieuw oefenen</button>
  </div>
</main>

<script>
const ALL_CARDS = [

// ============================================================
// TIJDVAK 1 — Jagers en Boeren
// ============================================================
{t:"Tijdvak 1", ka:"KA1: jagers-verzamelaars",
 q:"Wat zijn de belangrijkste kenmerken van de levenswijze van jagers-verzamelaars?",
 a:"Nomadisch bestaan, kleine groepen, geen eigendom van grond, afhankelijk van seizoenen, gebruik van vuursteen en bot, animistisch geloof en grafgiften als teken van ritueel leven."},

{t:"Tijdvak 1", ka:"KA2: landbouwsamenlevingen",
 q:"Wat zijn de gevolgen van het ontstaan van landbouw voor de samenleving?",
 a:"Sedentaire levensstijl, bevolkingsgroei, eigendom van land, specialisatie van arbeid, sociale ongelijkheid, overschotten die handel mogelijk maken en de basis leggen voor steden."},

{t:"Tijdvak 1", ka:"KA3: eerste steden",
 q:"Welke sociaaleconomische en politieke veranderingen gingen gepaard met het ontstaan van de eerste stedelijke gemeenschappen?",
 a:"Ontstaan van bestuurselites, schrijfkunst voor administratie, arbeidsdeling, tempels als economisch centrum, irrigatiesystemen en vroege staatsvorm (bijv. Mesopotamië, Sumerische stadstaten)."},

// ============================================================
// TIJDVAK 2 — Grieken en Romeinen
// ============================================================
{t:"Tijdvak 2", ka:"KA4: democratie Athene",
 q:"Wat zijn de kenmerken van de democratie in Athene, zoals bedoeld bij het denken over burgerschap en politiek in de Griekse stadstaat?",
 a:"Directe democratie via de volksvergadering (ekklesia), loting voor ambten, actief burgerschap — maar alleen voor vrije mannelijke burgers; vrouwen, slaven en vreemdelingen uitgesloten."},

{t:"Tijdvak 2", ka:"KA5: klassieke vormentaal",
 q:"Wat wordt bedoeld met de klassieke vormentaal van de Grieks-Romeinse cultuur, en welke kunstvormen zijn daarbinnen relevant?",
 a:"Bouwkunst (zuilenorden: Dorisch, Ionisch, Corinthisch; tempels, amfitheaters) en beeldhouwkunst (idealisering van het menselijk lichaam, harmonie en proporties). Basis voor de westerse kunst."},

{t:"Tijdvak 2", ka:"KA6: groei Romeins imperium",
 q:"Wat zijn de oorzaken van de groei van het Romeinse imperium, en hoe beïnvloedden Romeinen en veroverde volkeren elkaar cultureel?",
 a:"Effectief leger, infrastructuur (wegen, aquaducten), bestuurlijke organisatie. Culturele uitwisseling: Romeinen namen Griekse religie, kunst en filosofie over; veroverde volkeren romaniseerden geleidelijk."},

{t:"Tijdvak 2", ka:"KA7: Germanen vs. Rome",
 q:"Wat gebeurde er in de late Oudheid toen Germaanssprekende groepen het Romeinse rijk binnendrongen?",
 a:"Germaanse volksstammen (Visigoten, Vandalen, Franken) drongen door in het westelijk Rijk, wat leidde tot politieke instabiliteit en uiteindelijk de val van het West-Romeinse Rijk in 476 n.Chr."},

{t:"Tijdvak 2", ka:"KA8: jodendom en christendom",
 q:"Hoe verhouden het jodendom en het christendom zich tot elkaar, en welke rol speelde het christendom in het Romeinse rijk?",
 a:"Het christendom kwam voort uit het jodendom (Jezus als Joodse profeet). Na eeuwen van vervolging werd het christendom staatsgodsdienst onder keizer Theodosius I (380 n.Chr.)."},

// ============================================================
// TIJDVAK 3 — Monniken en Ridders
// ============================================================
{t:"Tijdvak 3", ka:"KA9: verspreiding christendom",
 q:"Hoe verspreidde het christendom zich door Europa, en welke actoren speelden daarin een rol?",
 a:"Geleidelijk proces via monniken (kloosterorden) en de politieke elite. Soms van bovenaf (vorst bekeerde zich eerst), soms via syncretisme (inlijving van heidense rituelen). Bijv. Bonifatius in Germania."},

{t:"Tijdvak 3", ka:"KA10: islam",
 q:"Wat zijn de kernideeën van de islam en hoe verspreidde de islam zich?",
 a:"Kernideeën: één God (Allah), Mohammed als profeet, vijf zuilen (geloofsuitspraak, gebed, vasten, aalmoezen, hadj). Verspreiding via verovering én handel vanuit het Arabisch Schiereiland (7e eeuw) naar Noord-Afrika, Spanje en Azië."},

{t:"Tijdvak 3", ka:"KA11: hofstelsel en horigheid",
 q:"Wat is het causale verband tussen de ondergang van het West-Romeinse Rijk en het ontstaan van een zelfvoorzienende agrarische samenleving met hofstelsel en horigheid?",
 a:"De ineenstorting van het Rijk vernietigde de handel, de steden en de monetaire economie. Mensen trokken naar het platteland. Grootgrondbezitters (heren) boden bescherming in ruil voor arbeid — het hofstelsel ontstond, met horigen die grond bewerkten zonder vrijheid."},

{t:"Tijdvak 3", ka:"KA12: feodalisme",
 q:"Wat zijn de kenmerken van feodale verhoudingen in het bestuur?",
 a:"Hiërarchisch systeem: de koning verleende land (leen) aan edelen (vazallen) in ruil voor militaire dienst en trouw. Vazallen deden hetzelfde met lagere edelen. Macht was persoonlijk, lokaal en gebaseerd op wederzijdse plichten."},

// ============================================================
// TIJDVAK 4 — Steden en Staten
// ============================================================
{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA13: opkomst handel en ambacht",
 q:"Welke veranderingen deden zich in Europa voor vanaf de 11e eeuw die de basis legden voor het herleven van een agrarisch-urbane samenleving?",
 a:"Landbouwinnovaties verhoogden de productie, bevolking groeide, handel herleefde, monetaire economie nam toe. Met name Vlaanderen werd een van de meest verstedelijkte gebieden. Steden als Atrecht werden centra van lakennijverheid en handel."},

{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA13: opkomst handel en ambacht",
 q:"Welke rol speelden jaarmarkten en handelsnetwerken in de opkomst van de middeleeuwse steden?",
 a:"Via jaarmarkten in Noord-Frankrijk en later via de Hanzesteden verbonden handelaren lokale markten met internationale netwerken, tot aan Italiaanse stadstaten. Brugge groeide uit tot handelscentrum van Noordwest-Europa."},

{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA14: stedelijke burgerij",
 q:"Hoe verwierven middeleeuwse steden hun zelfstandigheid?",
 a:"Stedelingen kochten, bevochten en onderhandelden over stadsrechten. Met stadsrechten verkregen ze eigen rechtbanken, bestuur en belastingregels. Rijke kooplieden organiseerden zich in gilden en kregen zo invloed op het stadsbestuur."},

{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA14: stedelijke burgerij",
 q:"Wat was de Guldensporenslag (1302) en welke betekenis had het voor de stedelijke burgerij?",
 a:"In 1302 versloegen Vlaamse ambachtslieden en boeren een Frans ridderleger bij Kortrijk. Het toonde dat de stedelijke burgerij en het gemeen een serieuze politieke en militaire macht waren tegenover patriciërs en feodale heren."},

{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA14: stedelijke burgerij",
 q:"Hoe veranderde de positie van de stedelijke burgerij in de Lage Landen tussen 1302 en 1602?",
 a:"Steden groeiden in macht maar kwamen onder druk van Bourgondische en later Habsburgse centraliseringspolitiek. Antwerpen nam de rol van Brugge over als handelscentrum. De Opstand (1568) verstoorde alles: Antwerpen verloor haar positie in 1585, kapitaal vluchtte naar Holland."},

{t:"Tijdvak 4", ka:"KA15: investituurstrijd",
 q:"Wat was het conflict in de christelijke wereld over wie het primaat had — de wereldlijke of geestelijke macht?",
 a:"De Investituurstrijd (11e–12e eeuw) tussen keizers en pausen over wie bisschoppen mocht benoemen. Opgelost via het Concordaat van Worms (1122): de kerk benoemt geestelijken, de keizer belent hen met wereldlijke macht. Markeerde scheiding kerk–staat."},

{t:"Tijdvak 4", ka:"KA16: kruistochten",
 q:"Wat waren de kruistochten en wat was hun doel?",
 a:"Militaire expedities (1096–1291) door Europese christenen om Jeruzalem en het Heilige Land te heroveren op moslims, op oproep van de paus. Tevens uitdrukking van religieus enthousiasme, streven naar aflaat en politieke expansie."},

{t:"Tijdvak 4 / HC Steden & Burgers", ka:"KA17: staatsvorming",
 q:"Wat kenmerkt het begin van staatsvorming en centralisatie in de late middeleeuwen?",
 a:"Vorsten probeerden macht te centraliseren via eigen rechtbanken, belastingen en een professioneel ambtenarenapparaat — ten koste van de adel en steden. In de Lage Landen deden de Bourgondische hertogen dit in de 15e eeuw."},

// ============================================================
// TIJDVAK 5 — Ontdekkers en Hervormers
// ============================================================
{t:"Tijdvak 5", ka:"KA18: Europese overzeese expansie",
 q:"Wat zijn de oorzaken en gevolgen van het begin van de Europese overzeese expansie?",
 a:"Oorzaken: zoeken naar handelsroutes naar Azië, technologische innovatie (kompas, karaveel), concurrentie tussen Portugal en Spanje, kruistochtsideaal. Gevolgen: Columbus-uitwisseling, opbouw van koloniale rijken, trans-Atlantische slavenhandel, verwoesting inheemse culturen."},

{t:"Tijdvak 5", ka:"KA19: Renaissance",
 q:"Wat zijn de kenmerken van het veranderende mens- en wereldbeeld van de Renaissance?",
 a:"Herleving van de klassieke Oudheid, humanisme (de mens centraal), empirische belangstelling voor de natuur, perspectief in beeldende kunst, beginnend wetenschappelijk denken. Startpunt: Italië vanaf het midden van de 14e eeuw."},

{t:"Tijdvak 5", ka:"KA20: heroriëntatie klassieke Oudheid",
 q:"Op welke manieren uitte de hernieuwde oriëntatie op de klassieke Oudheid zich in de Renaissance?",
 a:"In bouwkunst (zuilen, koepels, symmetrie), beeldende kunst (realisme, anatomische studie) en het humanisme (bestudering van Griekse en Latijnse teksten, kritisch tekstonderzoek). Figuren: Erasmus, Leonardo da Vinci, Michelangelo."},

{t:"Tijdvak 5 / HC Verlichting", ka:"KA21: protestantse Reformatie",
 q:"Wat leidde tot de protestantse Reformatie en wat waren de gevolgen voor de christelijke kerk?",
 a:"Luther (95 stellingen, 1517) keerde zich tegen aflatenhandel en pauselijk gezag. Bijbelvertaling via boekdrukpers verspreidde ideeën snel. Gevolg: splitsing in lutheranisme, calvinisme en anglikanisme; godsdienstoorlogen; Contrareformatie."},

{t:"Tijdvak 5 / HC Steden & Burgers", ka:"KA22: Nederlandse Opstand",
 q:"Wat waren de oorzaken van het conflict in de Nederlanden dat resulteerde in de stichting van een Nederlandse staat?",
 a:"Centralisatiepolitiek van Filips II, invoering van de inquisitie, zware belastingen (de Tiende Penning van Alva), calvinistische verspreiding, Beeldenstorm (1566). Onder leiding van Willem van Oranje brak een opstand uit die eindigde in de Republiek (Unie van Utrecht 1579, Acte van Verlatinghe 1581)."},

// ============================================================
// TIJDVAK 6 — Regenten en Vorsten
// ============================================================
{t:"Tijdvak 6 / HC Steden & Burgers + Verlichting", ka:"KA23: absolutisme",
 q:"Wat zijn de kenmerken van het streven van vorsten naar absolute macht?",
 a:"Centralisatie van wetgeving, rechtspraak en belastingen. Legitimatie via goddelijk recht (droit divin). Geen onafhankelijk parlement. Voorbeelden: Lodewijk XIV ('l'état c'est moi'), maar ook spanning met steden en adel."},

{t:"Tijdvak 6 / HC Steden & Burgers", ka:"KA24: Nederlandse Republiek",
 q:"Wat maakte de positie van de Republiek der Zeven Verenigde Nederlanden staatkundig bijzonder?",
 a:"Geen monarchie maar een federale republiek met soevereine gewesten, regentenaristocratie en stadhouders. Particularisme van steden bleef groot. Religieuze tolerantie trok vluchtelingen en kapitaal aan."},

{t:"Tijdvak 6 / HC Steden & Burgers", ka:"KA24: economische bloei Republiek",
 q:"Waardoor beleefde de Republiek in de Gouden Eeuw een economische bloei?",
 a:"Stapelmarktfunctie van Amsterdam, VOC (1602) en WIC voor wereldhandel, koopmansbeurs, investeringen in molens en droogmakerijen. De Dertigjarige Oorlog en Franse binnenlandse onrust begunstigden de Republiek tijdelijk als dominante handelsmacht."},

{t:"Tijdvak 6 / HC Steden & Burgers", ka:"KA24: culturele bloei Republiek",
 q:"Hoe uitte de culturele bloei van de Republiek zich in de Gouden Eeuw?",
 a:"Rijke kooplieden als mecenas: Rembrandt en Vermeer vonden een enorme markt. Stadspaleizen, grachtengordel Amsterdam. Relatieve persvrijheid maakte de Republiek tot centrum van wetenschappelijk en filosofisch debat (Spinoza, Descartes woonde er)."},

{t:"Tijdvak 6 / HC Steden & Burgers", ka:"KA25: wereldhandel en handelskapitalisme",
 q:"Wat wordt bedoeld met handelskapitalisme en het begin van een wereldeconomie in de 17e eeuw?",
 a:"De VOC (1602) was de eerste naamloze vennootschap met aandelenkapitaal. Via de koopmansbeurs werd risico gespreid. Handel verbond Europa, Azië, Afrika en Amerika. Amsterdam werd centrum van een mondiale economie."},

{t:"Tijdvak 6 / HC Verlichting", ka:"KA26: wetenschappelijke revolutie",
 q:"Wat was de wetenschappelijke revolutie en welke factoren droegen eraan bij?",
 a:"17e-eeuwse omwenteling in het wetenschappelijk denken. Bijdragen: ontdekkingsreizen, humanistische tekstanalyse, rationalisme (Descartes), empirisme (Locke/Bacon), Newtons natuurwetten. Leidde tot discussie over positie van godsdienst in de samenleving."},

// ============================================================
// TIJDVAK 7 — Pruiken en Revoluties
// ============================================================
{t:"Tijdvak 7 / HC Verlichting", ka:"KA27: verlicht denken",
 q:"Wat zijn de kernideeën van de Verlichting en welke denkers zijn daarin centraal?",
 a:"Toepassing van rede en wetenschap op samenleving, kritiek op traditie en kerk, geloof in vooruitgang. Kerndenkers: Locke (natuurrechten, sociaal contract), Rousseau (volkssoevereiniteit, gelijkheid), Montesquieu (scheiding der machten), Adam Smith (vrijemarkteconomie)."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA27: verlicht denken",
 q:"Wat was het belang van de publieke opinie voor de politieke cultuur tijdens de Verlichting?",
 a:"Voor het eerst moesten vorsten rekening houden met publieke opinie in alle lagen van de bevolking. Nieuwe ideeën werden in salons, kranten en pamfletten besproken. Publicatie van verlichtingsideeën werd door vorsten streng in de gaten gehouden en soms verboden."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA28: verlicht absolutisme",
 q:"Wat is verlicht absolutisme en hoe verhield het zich tot de ideeën van de Verlichting?",
 a:"Vorsten zoals Frederik de Grote en Jozef II omarmden verlichtingsideeën (tolerantie, rechtshervorming, onderwijs) zonder het absolutisme los te laten. Verlichting als middel voor een effectiever bestuur, niet als weg naar democratie."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA29: trans-Atlantische slavenhandel",
 q:"Hoe hing de trans-Atlantische slavenhandel samen met de Europese plantagekoloniën, en wat was het abolitionisme?",
 a:"Suiker-, tabaks- en katoenplantages in Amerika hadden goedkope arbeid nodig. Miljoenen Afrikanen werden tot slaaf gemaakt en verscheept (Middle Passage). Abolitionisme: beweging die slavernij wilde afschaffen, mede geïnspireerd door verlichtingsideeën over gelijkheid."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA30: democratische revoluties",
 q:"Hoe werden verlichtingsideeën in de Amerikaanse Onafhankelijkheidsverklaring (1776) in de praktijk gebracht?",
 a:"Dertien Britse koloniën verklaarden zich onafhankelijk. De grondwet weerspiegelde verlichtingsideeën: volkssoevereiniteit, scheiding der machten, grondrechten. Maar: vrouwen, slaafgemaakten en inheemse bevolking kregen deze rechten niet."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA30: democratische revoluties",
 q:"Hoe verliep de Franse Revolutie en welke fasen zijn te onderscheiden?",
 a:"1789: financiële crisis, bijeenroeping Staten-Generaal, Verklaring van de rechten van de mens, constitutionele monarchie. 1792: tweede revolutie, republiek, jakobijnen onder Robespierre voeren Terreur in. Na de Terreur: instabiliteit, tot Napoleon in 1799 de macht greep."},

{t:"Tijdvak 7 / HC Verlichting", ka:"KA30: democratische revoluties",
 q:"Wat was de rol van Napoleon bij het verspreiden van revolutionaire ideeën?",
 a:"Napoleon veroverde groot deel van Europa en voerde de Code Napoléon in — wetboeken met revolutionaire ideeën: gelijkheid voor de wet, eigendomsrecht, afschaffing van privileges. Maar: hij kroonde zichzelf tot keizer en ondermijnde democratische principes."},

// ============================================================
// TIJDVAK 8 — Burgers en Stoommachines
// ============================================================
{t:"Tijdvak 8 / HC Verlichting", ka:"KA31: industriële revolutie",
 q:"Wat zijn de kenmerken en gevolgen van de industriële revolutie in de westerse wereld?",
 a:"Stoommachine, fabrieksproductie, versteding, groei van het proletariaat, kinderarbeid, spoorwegen. Leidde tot enorme welvaartsgroei maar ook grote sociale ongelijkheid en de 'sociale kwestie'. Aanvankelijk in Engeland, daarna continentaal Europa."},

{t:"Tijdvak 8 / HC Verlichting", ka:"KA32: sociale kwestie",
 q:"Wat hield de discussie over de 'sociale kwestie' in de 19e eeuw in?",
 a:"De vraag hoe de ellendige leefomstandigheden van arbeiders (lange werkdagen, lage lonen, sloppenwijken) aangepakt moesten worden. Antwoorden varieerden: liberalen zagen het als persoonlijke verantwoordelijkheid, socialisten eisten staatsingrijpen, christenen ontwikkelden katholieke sociale leer."},

{t:"Tijdvak 8 / HC China", ka:"KA33: modern imperialisme",
 q:"Wat kenmerkt de moderne vorm van imperialisme die verband hield met de industrialisatie?",
 a:"Industriële landen hadden grondstoffen, afzetmarkten en investeringsgebieden nodig. Europese mogendheden verdeelden Afrika (Conferentie van Berlijn 1884–85) en drongen China binnen via ongelijke verdragen. Legitimering via 'beschavingsmissie' en Sociaal Darwinisme."},

{t:"Tijdvak 8 / HC Verlichting + China", ka:"KA34: emancipatiebewegingen",
 q:"Welke emancipatiebewegingen ontstonden in de 19e eeuw en wat streefden zij na?",
 a:"Arbeidersbeweging (vakbonden, socialistische partijen), vrouwenbeweging (kiesrecht, gelijke rechten — bijv. Aletta Jacobs in NL), abolitionisme (afschaffing slavernij), nationalisme als collectieve emancipatie van volkeren."},

{t:"Tijdvak 8 / HC Verlichting", ka:"KA35: democratisering",
 q:"Hoe verliep de voortschrijdende democratisering in Europa in de 19e eeuw?",
 a:"Geleidelijke uitbreiding van het kiesrecht, aanvankelijk censuskiesrecht (alleen bezittenden), later algemeen mannenkiesrecht en uiteindelijk vrouwenkiesrecht. In Nederland: Thorbeckes grondwetsherziening 1848, Pacificatie 1917 (algemeen kiesrecht en onderwijsgelijkstelling)."},

{t:"Tijdvak 8 / HC Verlichting", ka:"KA36: politieke stromingen",
 q:"Wat zijn de kernideeën van het liberalisme, socialisme, nationalisme, confessionalisme en feminisme als 19e-eeuwse politieke stromingen?",
 a:"Liberalisme: individuele vrijheid, beperkte staat. Socialisme: gelijkheid, collectief eigendom. Nationalisme: eenheid op basis van taal en cultuur (leidde tot eenwording Italië en Duitsland). Confessionalisme: christelijke waarden in politiek. Feminisme: gelijke rechten voor vrouwen."},

// ============================================================
// TIJDVAK 9 — Wereldoorlogen
// ============================================================
{t:"Tijdvak 9 / HC Duitsland", ka:"KA37: propaganda en massaorganisatie",
 q:"Welke rol speelden propaganda en communicatiemiddelen in het nationaalsocialisme?",
 a:"Goebbels stuurde alle media: radio, film (Riefenstahl), posters, massameetings (Neurenberg) verspreidden de nazi-ideologie. De NSDAP was een massaorganisatie met paramilitaire takken (SA, SS). Propaganda was essentieel voor het creëren van de Volksgemeinschaft."},

{t:"Tijdvak 9 / HC China + Duitsland", ka:"KA38: totalitaire ideologieën",
 q:"Wat zijn de kenmerken van het in praktijk brengen van de totalitaire ideologieën communisme en fascisme/nationaalsocialisme?",
 a:"Beide: eénpartijstaat, terreur, propaganda, staatscultus. Verschil: communisme richt zich op klasse (proletariaat vs. bourgeoisie); nazisme op ras (Arisch ras, antisemitisme). Stalin: gulags en zuiveringen. Hitler: Holocaust en Volksgemeinschaft."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA39: crisis wereldkapitalisme",
 q:"Wat was de crisis van het wereldkapitalisme en welke gevolgen had die voor Duitsland?",
 a:"De beurskrach van 1929 leidde tot massawerkloosheid, bankencrises en protectionisme wereldwijd. In Duitsland verdiepte de crisis de politieke instabiliteit van de Weimarrepubliek. De NSDAP profiteerde: Hitler beloofde herstel van welvaart en nationale eer."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA40: twee wereldoorlogen",
 q:"Wat waren de oorzaken van de Eerste Wereldoorlog?",
 a:"Militarisme (wapenwedloop), alliantiestelsels (Triple Entente vs. Triple Alliantie), imperialisme (concurrentie om koloniën), nationalisme (met name op de Balkan). Aanleiding: moord op Franz Ferdinand in Sarajevo (1914)."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA40: twee wereldoorlogen",
 q:"Welke gevolgen had het Verdrag van Versailles (1919) voor Duitsland?",
 a:"Duitsland accepteerde oorlogsschuld, verloor grondgebied (Elzas-Lotharingen, Poolse corridor), moest enorme herstelbetalingen betalen en mocht slechts een klein leger houden. De vernederende voorwaarden voedden de dolkstootlegende en het opkomend nationaalsocialisme."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA40: twee wereldoorlogen",
 q:"Hoe kon Hitler in 1933 aan de macht komen in Duitsland?",
 a:"De Weimarrepubliek was verzwakt door herstelbetalingen, de beurskrach (1929) en politieke extremisten. De NSDAP werd via verkiezingen de grootste partij. Na Hitlers benoeming tot rijkskanselier maakte de Rijksdagbrand en de machtigingswet een einde aan de democratie."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA41: genocide",
 q:"Wat was de Holocaust en hoe werd die georganiseerd?",
 a:"Systematische genocide door de nazi's op zes miljoen Joden en miljoenen anderen (Roma, gehandicapten, homo's, politieke tegenstanders). Fasen: uitsluiting (Neurenbergwetten 1935), getto's, Wannseeconferentie (1942) en vernietigingskampen (Auschwitz, Sobibor)."},

{t:"Tijdvak 9 / HC Duitsland", ka:"KA42: Duitse bezetting Nederland",
 q:"Wat zijn de belangrijkste kenmerken van de Duitse bezetting van Nederland (1940–1945)?",
 a:"Duitsland viel Nederland binnen in mei 1940. De bezetter stelde de rechtsstaat buiten werking, voerde arbeidsdienst in en deporteerde de Nederlandse Joden (meer dan 100.000) naar vernietigingskampen. Zowel verzet als collaboratie kwamen voor."},

{t:"Tijdvak 9", ka:"KA43: massavernietigingswapens",
 q:"Welke nieuwe schaal van verwoesting kenmerkte de Tweede Wereldoorlog?",
 a:"Atoombommen op Hiroshima en Nagasaki (1945), bombardementen op steden (Rotterdam, Dresden, Londen), totale oorlogsvoering waarbij de burgerbevolking direct doelwit was. Gevechten aan meerdere fronten tegelijk, miljoenen burgerslachtoffers."},

{t:"Tijdvak 9 / HC China", ka:"KA44: verzet tegen imperialisme",
 q:"Welke vormen van verzet tegen het West-Europese imperialisme zijn te onderscheiden, en welke rol speelden de wereldoorlogen daarin?",
 a:"Opkomend nationaal bewustzijn in koloniën (India, Indonesië, China). Verzet via gewapende opstand (bijv. Bokseropstand China 1900), politieke bewegingen en nationalistische partijen. De wereldoorlogen verzwakten Europese mogendheden en versterkten het dekolonisatieproces."},

// ============================================================
// TIJDVAK 10 — Televisie en Computer
// ============================================================
{t:"Tijdvak 10 / HC Duitsland + China", ka:"KA45: Koude Oorlog",
 q:"Wat was de Koude Oorlog en welke ideologische blokken stonden tegenover elkaar?",
 a:"Geopolitiek en ideologisch conflict (1947–1991) tussen de VS (kapitalisme, liberale democratie, NAVO) en de Sovjet-Unie (communisme, planeconomie, Warschaupact). Nooit directe oorlog, maar wapenwedloop, proxy-oorlogen en dreiging van atoomoorlog."},

{t:"Tijdvak 10 / HC Duitsland", ka:"KA45: Koude Oorlog",
 q:"Hoe beïnvloedde de Koude Oorlog de deling en wederopbouw van Duitsland (1945–1961)?",
 a:"Duitsland werd verdeeld in vier bezettingszones. In 1949 ontstonden de BRD (westers, democratisch, Marshallplan) en DDR (Sovjet-model, totalitaire dictatuur). Berlijnse Blokkade (1948) werd via luchtbrug omzeild. DDR-burgers vluchtten naar het Westen → Berlijnse Muur gebouwd in 1961."},

{t:"Tijdvak 10 / HC Duitsland", ka:"KA45: Koude Oorlog",
 q:"Wat verklaart de val van de Berlijnse Muur (1989) en de hereniging van Duitsland (1990)?",
 a:"Gorbatsjovs glasnost en perestrojka. DDR-leiding weigerde te hervormen, massaprotesten groeiden. Oost-Europese landen openden grenzen. Op 9 november 1989 viel de muur. In 1990 hereniging; Kohl accepteerde de euro in ruil voor Franse steun. In 1991 uiteenvallen Sovjet-Unie."},

{t:"Tijdvak 10", ka:"KA46: dekolonisatie",
 q:"Wat waren de oorzaken van de dekolonisatie na 1945?",
 a:"Verzwakking van Europese mogendheden door WOII, nationalistisch bewustzijn in koloniën, druk van VS en VN (zelfbeschikkingsrecht), toenemende kosten van koloniale controle. Voorbeelden: Indonesische onafhankelijkheid (1945/1949), India (1947), Afrikaanse landen (jaren '60)."},

{t:"Tijdvak 10 / HC Duitsland", ka:"KA47: eenwording Europa",
 q:"Wat zijn de fundamenten en drijfveren van de Europese integratie na 1945?",
 a:"EGKS (1951, Schuman/Adenauer): kolen en staal als basis voor vrede. EEG (1957, Verdrag van Rome): gemeenschappelijke markt. Drijfveer: nooit meer oorlog tussen Europese staten. Groei naar EU (Maastricht 1992), euro, uitbreiding met voormalig Oostblok."},

{t:"Tijdvak 10 / HC Duitsland + China", ka:"KA48: westerse welvaart en sociaal-culturele verandering",
 q:"Welke ingrijpende sociaal-culturele veranderingsprocessen vonden plaats in het Westen vanaf de jaren '60?",
 a:"Welvaartsgroei → individualisering, seksuele revolutie, ontzuiling, vrouwenemancipatie, studentenprotesten (1968), antioorlogsbeweging. In BRD ook links terrorisme (Baader-Meinhof Gruppe) als reactie op beperkte denazificatie en consumptiecultuur."},

{t:"Tijdvak 10", ka:"KA49: pluriforme en multiculturele samenlevingen",
 q:"Wat wordt bedoeld met de ontwikkeling van pluriforme en multiculturele samenlevingen?",
 a:"Door immigratie (gastarbeiders, postkoloniale migratie), globalisering en secularisering ontstonden samenlevingen met meerdere culturen, religies en levensstijlen naast elkaar. Dit leidde tot debatten over integratie, identiteit en de grenzen van tolerantie."},

// ============================================================
// HISTORISCHE CONTEXT: STEDEN EN BURGERS (extra verdiepingsvragen)
// ============================================================
{t:"HC Steden & Burgers 1050–1700", ka:"Brugge en Atrecht",
 q:"Welke rol speelde Atrecht in de vroege stedelijke ontwikkeling van de Lage Landen?",
 a:"Atrecht was het startpunt van stedelijke dynamiek: hoge landbouwproductiviteit en schapenhouderij maakten de stad een centrum van lakennijverheid. Handelaren vonden aansluiting op jaarmarkten in Frankrijk en verder tot Italiaanse stadstaten. Rijke kooplieden in koopliedengilde namen het stadsbestuur over."},

{t:"HC Steden & Burgers 1050–1700", ka:"Brugge als handelscentrum",
 q:"Welke innovaties maakten Brugge tot het handelscentrum van Noordwest-Europa rond 1300?",
 a:"Brugge combineerde de wisselbrief met het bankwezen tot de eerste koopmansbeurs. Het had via de Noordzee verbindingen met de Hanze én Spanje en Italië. Patriciërs namen een adellijke levensstijl aan, wat leidde tot sociale spanningen met ambachtslieden."},

{t:"HC Steden & Burgers 1050–1700", ka:"Antwerpen",
 q:"Waarom nam Antwerpen de rol van Brugge over als handelscentrum in de 15e–16e eeuw?",
 a:"Antwerpen had een goede verbinding met het Europese achterland en was toegankelijk voor de nieuwe grotere zeeschepen. Het profiteerde van de Bourgondische centraliseringspolitiek en nam een centrale rol in de handel met Spaanse en Portugese koloniën in."},

{t:"HC Steden & Burgers 1050–1700", ka:"Republiek na 1602",
 q:"Waarom leidde het Rampjaar 1672 tot het einde van de Gouden Eeuw van de Republiek?",
 a:"Engeland en het absolutistische Frankrijk voerden mercantilistisch beleid. Na 1672 namen investeringen in het buitenland toe en oligarchiseerde de regentenklasse. Toenemende concurrentie in de wereldhandel; Londen nam de rol van Amsterdam als financieel centrum over."},

// ============================================================
// HISTORISCHE CONTEXT: VERLICHTING (extra verdiepingsvragen)
// ============================================================
{t:"HC Verlichting 1650–1900", ka:"Sociaal contract",
 q:"Wat verstonden Locke en Rousseau onder het 'sociaal contract' en hoe verschilden zij daarin?",
 a:"Locke: het volk draagt macht over aan de overheid; als die de natuurrechten (leven, vrijheid, eigendom) schendt, mag het volk in opstand komen. Rousseau: alle macht gaat uit van de algemene wil (volonté générale); directe democratie, gelijkheid ook van armen en slaven."},

{t:"HC Verlichting 1650–1900", ka:"Montesquieu",
 q:"Wat is de trias politica van Montesquieu en waarom was het zo invloedrijk?",
 a:"Montesquieu pleitte voor scheiding van wetgevende, uitvoerende en rechterlijke macht om tirannie te voorkomen. Dit idee werd opgenomen in de Amerikaanse grondwet (1787) en de Franse grondwet van 1791 en vormt de basis van moderne democratieën."},

{t:"HC Verlichting 1650–1900", ka:"Franse Revolutie fases",
 q:"Wie was Olympe de Gouges en waarom is ze historisch significant?",
 a:"Olympe de Gouges schreef de eerste Verklaring van de rechten van de vrouw (1791) als reactie op de Verklaring die vrouwen uitsloot. Ze werd door de jakobijnen geguillotineerd. Haar werk geldt als vroeg voorbeeld van het feminisme."},

{t:"HC Verlichting 1650–1900", ka:"Congres van Wenen",
 q:"Wat probeerden de Europese mogendheden te bereiken op het Congres van Wenen (1814–1815)?",
 a:"Herstel van de pre-napoleontische orde (restauratie): monarchieën terug aan de macht, grenzen hersteld, machtsevenwicht tussen grote mogendheden (Concert of Europe). Toch bleven veel napoleontische hervormingen (Code Napoléon, gelijkheid voor de wet) van kracht."},

{t:"HC Verlichting 1650–1900", ka:"Grondwet Nederland 1848",
 q:"Wat regelde de Nederlandse grondwetsherziening van Thorbecke in 1848?",
 a:"Nederland werd een constitutionele monarchie met ministeriële verantwoordelijkheid (ministers verantwoording aan parlement), directe verkiezingen voor de Tweede Kamer en vrijheden van onderwijs, vergadering en pers. Sloot aan bij liberale beginselen van de Verlichting."},

// ============================================================
// HISTORISCHE CONTEXT: CHINA 1842–2001
// ============================================================
{t:"HC China 1842–2001", ka:"Imperialisme in China",
 q:"Wat waren de 'ongelijke verdragen' en welke gevolgen hadden zij voor China?",
 a:"Na de Opiumoorlogen dwongen westerse mogendheden China ongelijke verdragen af: extra-territorialiteit in steden als Shanghai en Hongkong, lage importtarieven, verlies van soevereiniteit. China misliep inkomsten en verloor gezag over economische centra."},

{t:"HC China 1842–2001", ka:"Verzwakking Qing",
 q:"Welke interne en externe factoren leidden tot de verzwakking van de Qing-dynastie en de revolutie van 1911?",
 a:"Intern: corruptie, hongersnoden, politieke crises, mislukte hervormingen (Zelfversterkingsbeweging). Extern: verlies van grondgebied aan Japan (1895), Rusland en Frankrijk, vernederende Bokserprotocol (1901). In 1911 brak een revolutie uit die een einde maakte aan het keizerrijk."},

{t:"HC China 1842–2001", ka:"4 Meibeweging en CCP",
 q:"Wat was de 4 Meibeweging en hoe leidde zij tot de oprichting van de Chinese Communistische Partij?",
 a:"Na WWI protesteerden Chinese studenten (1919) tegen de toekenning van Duitse gebieden in China aan Japan (Verdrag van Versailles). De beweging zette zich in voor modernisering van bestuur, samenleving en cultuur. Onder invloed van marxisme en de Russische Revolutie richtten leden de CCP op."},

{t:"HC China 1842–2001", ka:"Nationalisten vs. communisten",
 q:"Hoe verliep de machtsstrijd tussen de nationalisten (Kuomintang) en de communisten in China tussen 1927 en 1949?",
 a:"Na samenwerking bloedige breuk in 1927: Chiang Kaishek vermoordde duizenden communisten. Lange Mars (1934–35). WWII: noodgedwongen samenwerking tegen Japan. Na Japanse capitulatie burgeroorlog. Communisten wonnen steun van boeren; nationalisten faalden economisch. In 1949 riep Mao de Volksrepubliek uit."},

{t:"HC China 1842–2001", ka:"Volksrepubliek China",
 q:"Wat was de Grote Sprong Voorwaarts en welke gevolgen had het?",
 a:"Mao's poging (1958–1962) China snel te industrialiseren via collectivisering van landbouw en lokale staalindustrie. Het project mislukte volkomen: de hongersnood kostte tientallen miljoenen mensen het leven. In 1962 koos de partij voor een pragmatischer economisch beleid."},

{t:"HC China 1842–2001", ka:"Culturele Revolutie",
 q:"Wat was de Culturele Revolutie (1966–1976) en wat waren de gevolgen?",
 a:"Maos poging de samenleving ingrijpend te hervormen: partijzuiveringen, cultus rond Mao, Rode Gardisten die intellectuelen, traditie en 'bourgeois' cultuur aanvielen. Anti-intellectueel, antitraditioneel en xenofoob. Ontwrichtte de gehele samenleving; na Maos dood (1976) officieel afgewezen."},

{t:"HC China 1842–2001", ka:"Vier Moderniseringen",
 q:"Wat waren de Vier Moderniseringen van Deng Xiaoping en wat was het politieke gevolg?",
 a:"Modernisering van landbouw, industrie, wetenschap & technologie en defensie. Leidde tot spectaculaire economische groei en opening naar het Westen. Maar politieke liberalisering werd geblokkeerd: studentendemonstraties op het Plein van de Hemelse Vrede (Tiananmen, 1989) werden bloedig neergeslagen."},

{t:"HC China 1842–2001", ka:"China en de Koude Oorlog",
 q:"Hoe raakte China betrokken bij de Koude Oorlog en hoe veranderde die positie?",
 a:"1949: Volksrepubliek steunde door USSR, Taiwan (nationalisten) door VS. Na Sino-Sovjet breuk (1960s) internationaal isolement. Toenadering tot VS in vroege jaren '70 (Nixon–Mao). In 1971 nam de Volksrepubliek de VN-zetel van Taiwan over. In 2001 toetreding tot de WTO."},

// ============================================================
// HISTORISCHE CONTEXT: DUITSLAND IN EUROPA 1918–1991
// ============================================================
{t:"HC Duitsland 1918–1991", ka:"Weimarrepubliek",
 q:"Waarom was de Weimarrepubliek (1919–1933) zo kwetsbaar?",
 a:"De democratie was geassocieerd met de oorlogsnederlaag en het 'schandelijke' Verdrag van Versailles (dolkstootlegende). Conservatieve elite en het leger stonden er vijandig tegenover. Economische instabiliteit (hyperinflatie 1923, crisis 1929) en extremistische partijen van links en rechts ondermijnden haar."},

{t:"HC Duitsland 1918–1991", ka:"Nazi-terreur",
 q:"Hoe bouwden de nazi's na 1933 een totalitair regime op?",
 a:"Met de machtigingswet (1933) schakelden ze het parlement uit. Terreur via SS en Gestapo. Propaganda nazificeerde de samenleving. Politieke tegenstanders en 'rassenvijanden' werden vervolgd. De Neurenbergwetten (1935) ontnamen Joden hun burgerrechten."},

{t:"HC Duitsland 1918–1991", ka:"Appeasement en WOII",
 q:"Wat was de appeasementpolitiek en waarom faalde zij?",
 a:"Groot-Brittannië en Frankrijk probeerden oorlog te voorkomen door tegemoet te komen aan Hitlers territoriale eisen (Conferentie van München 1938: afstaan van Sudetenland). Faalde omdat Hitler verdere eisen stelde; na de inval in Polen (1939) verklaarden zij Duitsland de oorlog."},

{t:"HC Duitsland 1918–1991", ka:"BRD vs DDR",
 q:"Wat zijn de belangrijkste verschillen tussen de BRD en de DDR in de jaren 1949–1961?",
 a:"BRD: parlementaire democratie, Marshallplan, Wirtschaftswunder, lid NAVO en EGKS, Adenauers Westintegration. DDR: volksrepubliek naar Sovjet-model, totalitaire dictatuur onder Ulbricht, Stasi-controle, Warschaupact, slechte economie → massale vlucht naar het Westen."},

{t:"HC Duitsland 1918–1991", ka:"Ostpolitik",
 q:"Wat was de Ostpolitik van Willy Brandt en welk doel diende zij?",
 a:"Vanaf 1969 normaliseerde Brandt de betrekkingen met de DDR en Oost-Europa. In 1972 erkenden BRD en DDR elkaar. Doel: détente en uiteindelijk hereniging via toenadering. Brandt investeerde tegelijk sterk in Europese integratie als garantie voor de westerse verhoudingen."},

{t:"HC Duitsland 1918–1991", ka:"Hereniging en Europa",
 q:"Hoe werd de hereniging van Duitsland (1990) mogelijk en wat waren de Europese gevolgen?",
 a:"Gorbatsjovs hervormingen (glasnost/perestrojka) leidden tot de val van de muur (1989). Kohl en Gorbatsjov sloten een akkoord. In ruil voor Franse steun (Mitterrand) voor de hereniging accepteerde Kohl de invoering van de euro. Duitsland nam een leidende rol in de EU op zich."},

// ============================================================
// DOMEIN A — Historisch denken en redeneren
// ============================================================
{t:"Domein A: historisch denken", ka:"Causaliteit",
 q:"Wat is het verschil tussen een oorzaak en een aanleiding in historische analyse?",
 a:"Een oorzaak is een structurele, diepere factor die een historische ontwikkeling mogelijk maakt (bijv. sociale ongelijkheid). Een aanleiding is de meest directe aanleiding — de concrete trigger die het proces op gang brengt (bijv. de moord op Franz Ferdinand als aanleiding voor WWI)."},

{t:"Domein A: historisch denken", ka:"Standplaatsgebondenheid",
 q:"Wat wordt bedoeld met standplaatsgebondenheid van historische actoren?",

];

let deck = [];
let current = null;
let flipped = false;
let statsTotal = 0, statsGood = 0, statsWrong = 0;
let rolling = [];
const TOTAL = ALL_CARDS.length;

function shuffle(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  deck = shuffle(ALL_CARDS.slice());
  statsTotal = 0; statsGood = 0; statsWrong = 0;
  rolling = [];
  document.getElementById('finished-area').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  updateStats();
  renderRolling();
  next();
}

function next() {
  if (deck.length === 0) { showFinished(); return; }
  current = deck.shift();
  flipped = false;
  document.getElementById('tijdvak-badge').textContent = current.t;
  document.getElementById('tijdvak-badge').title = current.t;
  document.getElementById('ka-tag').textContent = current.ka;
  document.getElementById('card-label').textContent = 'Vraag';
  document.getElementById('card-text').textContent = current.q;
  document.getElementById('card-hint').textContent = 'Tik om antwoord te zien';
  document.getElementById('card').classList.remove('flip');
  document.getElementById('btn-flip-row').classList.remove('hidden');
  document.getElementById('btn-answer-row').classList.add('hidden');
  document.getElementById('question-counter').textContent = statsGood + '/' + TOTAL;
  updateProgressBar();
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card-label').textContent = 'Antwoord';
  document.getElementById('card-text').textContent = current.a;
  document.getElementById('card-hint').textContent = '';
  document.getElementById('card').classList.add('flip');
  document.getElementById('btn-flip-row').classList.add('hidden');
  document.getElementById('btn-answer-row').classList.remove('hidden');
}

function answer(correct) {
  statsTotal++;
  if (correct) {
    statsGood++;
    rolling.push('g');
  } else {
    statsWrong++;
    rolling.push('w');
    // terugleggen op willekeurige positie in het resterende deck
    let pos = Math.floor(Math.random() * (deck.length + 1));
    deck.splice(pos, 0, current);
  }
  if (rolling.length > 20) rolling.shift();
  updateStats();
  renderRolling();
  next();
}

function updateStats() {
  document.getElementById('s-total').textContent = statsTotal;
  document.getElementById('s-good').textContent = statsGood;
  document.getElementById('s-wrong').textContent = statsWrong;
  if (rolling.length > 0) {
    let pct = Math.round(rolling.filter(x => x === 'g').length / rolling.length * 100);
    document.getElementById('s-ratio').textContent = pct + '%';
  } else {
    document.getElementById('s-ratio').textContent = '—';
  }
}

function renderRolling() {
  let container = document.getElementById('rolling-dots');
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    let dot = document.createElement('div');
    dot.className = 'dot' + (i < rolling.length ? ' ' + rolling[i] : '');
    container.appendChild(dot);
  }
  if (rolling.length > 0) {
    let pct = Math.round(rolling.filter(x => x === 'g').length / rolling.length * 100);
    document.getElementById('rolling-pct').textContent = pct + '%';
  } else {
    document.getElementById('rolling-pct').textContent = '—';
  }
}

function updateProgressBar() {
  document.getElementById('progress-bar').style.width = Math.round(statsGood / TOTAL * 100) + '%';
}

function showFinished() {
  document.getElementById('game-area').classList.add('hidden');
  document.getElementById('finished-area').classList.remove('hidden');
  document.getElementById('f-good').textContent = statsGood;
  document.getElementById('f-wrong').textContent = statsWrong;
}

function restart() { init(); }

function confirmReset() {
  if (statsTotal === 0 || confirm('Weet je zeker dat je opnieuw wilt beginnen? Je voortgang gaat verloren.')) {
    init();
  }
}

window.onload = init;
</script>
